name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run build
        env:
          NEXT_PUBLIC_META_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}
      - run: npm test

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 65.108.211.21 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            out/ michael@65.108.211.21:/var/www/hoeger.dev/
          rm ~/.ssh/deploy_key

      - name: Lighthouse audit
        run: |
          npm install -g @lhci/cli
          rm -rf .lighthouseci .lighthouseci-desktop .lighthouseci-mobile lighthouse-reports
          mkdir -p .lighthouseci-desktop .lighthouseci-mobile lighthouse-reports/desktop lighthouse-reports/mobile

          lhci collect --config=./lighthouserc.json
          cp -r .lighthouseci/. .lighthouseci-desktop/
          cp -r .lighthouseci/. lighthouse-reports/desktop/

          rm -rf .lighthouseci
          lhci collect --config=./lighthouserc.mobile.json
          cp -r .lighthouseci/. .lighthouseci-mobile/
          cp -r .lighthouseci/. lighthouse-reports/mobile/

      - name: Lighthouse budget assertions
        if: always()
        run: |
          rm -rf .lighthouseci
          cp -r .lighthouseci-desktop .lighthouseci
          lhci assert --config=./lighthouserc.json

          rm -rf .lighthouseci
          cp -r .lighthouseci-mobile .lighthouseci
          lhci assert --config=./lighthouserc.mobile.json

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.sha }}
          path: lighthouse-reports/
          retention-days: 90
