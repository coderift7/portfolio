<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="60%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Hexagon Icon (48x48, centered at 0,0 offset 12,12) -->
  <g transform="translate(12, 12)">
    <polygon points="24,3 42,13.5 42,34.5 24,45 6,34.5 6,13.5"
      fill="none" stroke="url(#grad)" stroke-width="1.5"/>
    <!-- Spokes -->
    <line x1="24" y1="3"    x2="24"   y2="21"   stroke="#0D9488" stroke-width="1" opacity="0.45"/>
    <line x1="42" y1="13.5" x2="26.6" y2="22.2" stroke="#0D9488" stroke-width="1" opacity="0.45"/>
    <line x1="42" y1="34.5" x2="26.6" y2="25.8" stroke="#0891B2" stroke-width="1" opacity="0.45"/>
    <line x1="24" y1="45"   x2="24"   y2="27"   stroke="#0891B2" stroke-width="1" opacity="0.45"/>
    <line x1="6"  y1="34.5" x2="21.4" y2="25.8" stroke="#0891B2" stroke-width="1" opacity="0.45"/>
    <line x1="6"  y1="13.5" x2="21.4" y2="22.2" stroke="#0D9488" stroke-width="1" opacity="0.45"/>
    <!-- Center -->
    <circle cx="24" cy="24" r="3" fill="url(#grad)"/>
    <!-- Corner nodes -->
    <circle cx="24" cy="3"    r="2.2" fill="#0D9488"/>
    <circle cx="42" cy="13.5" r="2.2" fill="#0D9488"/>
    <circle cx="42" cy="34.5" r="2.2" fill="#0891B2"/>
    <circle cx="24" cy="45"   r="2.2" fill="#0891B2"/>
    <circle cx="6"  cy="34.5" r="2.2" fill="#0891B2"/>
    <circle cx="6"  cy="13.5" r="2.2" fill="#0D9488"/>
  </g>

  <!-- Wordmark -->
  <text x="76" y="34"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30" font-weight="300" fill="#334155">Michael </text>
  <text x="175" y="34"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30" font-weight="800" fill="url(#textGrad)">Höger</text>

  <!-- Divider line -->
  <rect x="76" y="42" width="200" height="1.5" fill="url(#divGrad)" rx="1"/>

  <!-- Subtitle -->
  <text x="76" y="58"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="9.5" font-weight="600" fill="#94A3B8"
    letter-spacing="2">IT-BERATUNG &amp; WEBDESIGN</text>
</svg>
