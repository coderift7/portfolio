<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <linearGradient id="gradD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="textGradD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="divGradD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="60%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="72" fill="#0F172A" rx="0"/>

  <!-- Hexagon Icon -->
  <g transform="translate(12, 12)">
    <polygon points="24,3 42,13.5 42,34.5 24,45 6,34.5 6,13.5"
      fill="none" stroke="url(#gradD)" stroke-width="1.5"/>
    <line x1="24" y1="3"    x2="24"   y2="21"   stroke="#2DD4BF" stroke-width="1" opacity="0.35"/>
    <line x1="42" y1="13.5" x2="26.6" y2="22.2" stroke="#2DD4BF" stroke-width="1" opacity="0.35"/>
    <line x1="42" y1="34.5" x2="26.6" y2="25.8" stroke="#22D3EE" stroke-width="1" opacity="0.35"/>
    <line x1="24" y1="45"   x2="24"   y2="27"   stroke="#22D3EE" stroke-width="1" opacity="0.35"/>
    <line x1="6"  y1="34.5" x2="21.4" y2="25.8" stroke="#22D3EE" stroke-width="1" opacity="0.35"/>
    <line x1="6"  y1="13.5" x2="21.4" y2="22.2" stroke="#2DD4BF" stroke-width="1" opacity="0.35"/>
    <circle cx="24" cy="24" r="3" fill="url(#gradD)"/>
    <circle cx="24" cy="3"    r="2.2" fill="#2DD4BF"/>
    <circle cx="42" cy="13.5" r="2.2" fill="#2DD4BF"/>
    <circle cx="42" cy="34.5" r="2.2" fill="#22D3EE"/>
    <circle cx="24" cy="45"   r="2.2" fill="#22D3EE"/>
    <circle cx="6"  cy="34.5" r="2.2" fill="#22D3EE"/>
    <circle cx="6"  cy="13.5" r="2.2" fill="#2DD4BF"/>
  </g>

  <text x="76" y="34"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30" font-weight="300" fill="#94A3B8">Michael </text>
  <text x="175" y="34"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30" font-weight="800" fill="url(#textGradD)">Höger</text>

  <rect x="76" y="42" width="200" height="1.5" fill="url(#divGradD)" rx="1"/>

  <text x="76" y="58"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="9.5" font-weight="600" fill="#334155"
    letter-spacing="2">IT-BERATUNG &amp; WEBDESIGN</text>
</svg>
